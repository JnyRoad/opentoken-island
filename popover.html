<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenToken Island Popover</title>
  <script src="./assets/vendor/lucide-lite.js"></script>
  <script src="./assets/share-poster.js"></script>
  <style>
    :root { color-scheme: dark; --bg:#050505; --panel:#111112; --line:rgba(255,255,255,.16); --ink:#f7f7f8; --muted:rgba(247,247,248,.62); --blue:#0a84ff; --green:#30d158; --gold:#d8bf85; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif; }
    *{box-sizing:border-box} body{margin:0;width:100vw;height:100vh;min-height:0;display:grid;place-items:stretch;padding:18px;background:transparent;color:var(--ink);overflow:hidden} button{font:inherit;color:inherit;border:0;cursor:pointer}
    .panel{position:relative;width:100%;height:100%;min-height:0;padding:14px;border-radius:24px;background:linear-gradient(145deg,rgba(32,34,38,.72),rgba(18,18,20,.82));border:1px solid var(--line);box-shadow:0 30px 90px rgba(0,0,0,.46),inset 0 1px 0 rgba(255,255,255,.14);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);overflow:hidden;isolation:isolate}
    .panel::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 36%);opacity:.55;z-index:0}
    .symbol-bg{position:absolute;right:-18px;bottom:-24px;width:122px;height:122px;overflow:hidden;opacity:.14;z-index:0;pointer-events:none;mix-blend-mode:screen;mask-image:linear-gradient(to top,#000 6%,rgba(0,0,0,.74) 58%,transparent);-webkit-mask-image:linear-gradient(to top,#000 6%,rgba(0,0,0,.74) 58%,transparent)}
    .symbol-bg img{height:122px;width:477px;object-fit:contain;object-position:left center;display:block}.content{position:relative;z-index:1;height:100%;display:flex;flex-direction:column}.head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.title{margin:0;font-size:15px;font-weight:760}.sub{margin:4px 0 0;color:var(--muted);font-size:12px;max-width:278px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.live{height:28px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;border-radius:99px;background:rgba(48,209,88,.12);color:#77df8b;font-size:12px}.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(48,209,88,.14)}
    .actions{display:grid;grid-template-columns:1fr auto auto auto;gap:8px;margin-bottom:10px}.btn{height:34px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:7px;padding:0 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:700}.btn.primary{background:var(--blue);color:white;border-color:rgba(10,132,255,.6);box-shadow:0 12px 34px rgba(10,132,255,.22)}.btn.icon{width:34px;padding:0}.btn svg{width:15px;height:15px}
    .hero{display:grid;grid-template-columns:1fr auto;align-items:end;gap:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);margin-bottom:10px}.label{margin:0 0 6px;color:var(--muted);font-size:12px}.value{margin:0;font-size:32px;line-height:1;font-weight:780;font-variant-numeric:tabular-nums}.rank{min-width:70px;height:44px;border-radius:15px;display:grid;place-items:center;background:#fff;color:#050505;font-size:20px;font-weight:820;font-variant-numeric:tabular-nums}
    .game{display:grid;grid-template-columns:1fr 112px;gap:10px;margin-bottom:10px}.card{border-radius:16px;padding:10px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07)}.level-line{display:grid;grid-template-columns:auto minmax(0,1fr);align-items:center;gap:10px;margin-bottom:8px;font-size:12px}.level-line strong{font-size:13px;white-space:nowrap}.level-line span{min-width:0;text-align:right;color:var(--muted);font-size:11px;font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar{height:8px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden}.bar i{display:block;height:100%;width:72%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),#64d2ff)}.battle{text-align:center;display:grid;place-items:center}.battle strong{font-size:22px}.battle span{font-size:11px;color:var(--muted);line-height:1.3}.tools{display:grid;gap:6px;margin-bottom:10px}.tool{display:grid;grid-template-columns:82px 1fr 66px;align-items:center;gap:8px;padding:7px 8px;border-radius:12px;background:rgba(255,255,255,.045);font-size:12px}.tool .bar{height:7px}.tool-value{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}.quests{display:grid;gap:6px;margin-bottom:10px}.quest{display:grid;grid-template-columns:22px 1fr auto;gap:8px;align-items:center;min-height:48px;padding:8px;border-radius:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.07);overflow:hidden}.quest svg{width:18px;height:18px;max-width:18px;max-height:18px;display:block;color:rgba(255,255,255,.82)}.quest strong{display:block;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.quest span{display:block;margin-top:2px;color:var(--muted);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.xp{font-size:12px;font-weight:760;color:var(--green);white-space:nowrap}
  </style>
</head><body><main class="panel"><span class="symbol-bg"><img src="./assets/scys/icon_topnav.png" alt=""></span><div class="content"><header class="head"><div><p class="title">今日 OpenToken</p><p id="serviceText" class="sub">Loading opentoken service...</p></div><span class="live"><span class="dot"></span>live</span></header><div class="actions"><button id="uploadButton" class="btn primary"><i data-lucide="upload-cloud"></i><span id="uploadLabel">Upload now</span></button><button id="shareButton" class="btn"><i data-lucide="share-2"></i><span id="shareLabel">Share</span></button><button id="refreshButton" class="btn"><i data-lucide="refresh-cw"></i>Refresh</button><button id="openLogsButton" class="btn icon" aria-label="Open logs" title="Open logs"><i data-lucide="file-text"></i></button></div><section class="hero"><div><p class="label">Tokens</p><p id="totalValue" class="value">--</p></div><div id="rankValue" class="rank">#--</div></section><section class="game"><div class="card"><div class="level-line"><strong>今日进度</strong><span id="xpText">-- / 3 亿</span></div><div class="bar"><i id="xpFill"></i></div></div><div class="card battle"><div><strong id="rankDelta">#--</strong><span id="rankGap">排名状态<br>读取中</span></div></div></section><section id="toolList" class="tools"></section><section class="quests"><div class="quest"><i data-lucide="target"></i><div><strong>今日目标：冲到 3 亿</strong><span id="dailyQuestCopy">读取真实 token 数据中...</span></div><div class="xp">待确认</div></div><div class="quest"><i data-lucide="upload-cloud"></i><div><strong>上传状态</strong><span>等待 OpenToken 上报</span></div><div class="xp">等待</div></div></section></div></main><script>
const API = '/api';
let apiToken = '';
const $ = (selector) => document.querySelector(selector);
let latestSummary = null;
let lastIslandEventId = null;
let lastIslandEventPollLogAt = 0;
let lastIslandEventFailureLogAt = 0;

function icons() {
  if (window.lucide) lucide.createIcons();
}

async function loadClientConfig() {
  const response = await fetch(API + '/client-config');
  const data = await response.json();
  apiToken = data.apiToken || '';
  void logClientEvent('popover.clientConfig.loaded', { hasToken: Boolean(apiToken) });
}

function tokenHeaders(extra = {}) {
  return apiToken
    ? { ...extra, 'x-opentoken-island-token': apiToken }
    : extra;
}

function logClientEvent(event, details = {}) {
  if (!apiToken) return Promise.resolve(false);
  const controller = typeof AbortController === 'function' ? new AbortController() : null;
  const timeout = controller ? setTimeout(() => controller.abort(), 1500) : null;
  return fetch(API + '/logs/event', {
    method: 'POST',
    headers: tokenHeaders({ 'content-type': 'application/json' }),
    body: JSON.stringify({
      layer: 'popover',
      event,
      flow: event,
      details
    }),
    keepalive: true,
    signal: controller && controller.signal
  }).then(() => true).catch(() => false).finally(() => {
    if (timeout) clearTimeout(timeout);
  });
}

window.OpenTokenIslandLogEvent = logClientEvent;

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;'
  }[char]));
}

function renderQuests(quests) {
  const list = quests && quests.length ? quests : [{
    icon: 'timer-reset',
    title: '等待 OpenToken 上报',
    detail: '监听到下一次上传后自动同步',
    rewardLabel: '+0',
    done: false
  }];
  document.querySelector('.quests').innerHTML = list.map((quest) =>
    '<div class="quest' + (quest.done ? ' done' : '') + '"><i data-lucide="' + esc(quest.icon || 'target') + '"></i><div><strong>' + esc(quest.title) + '</strong><span>' + esc(quest.detail) + '</span></div><div class="xp">' + esc(quest.done ? '完成' : quest.rewardLabel) + '</div></div>'
  ).join('');
}

function setLoad(isLoading) {
  $('#uploadButton').disabled = isLoading;
  $('#uploadButton').style.opacity = isLoading ? '0.72' : '1';
  $('#uploadLabel').textContent = isLoading ? 'Uploading...' : 'Upload now';
}

function render(data) {
  if (!data || !data.ok) return;
  latestSummary = data;
  if (data.waiting) {
    const account = data.account && data.account.connected
      ? 'scys ' + data.account.accountId
      : '未绑定 scys';
    const daemon = data.service && data.service.running ? 'daemon running' : 'service unknown';
    $('#totalValue').textContent = '--';
    $('#rankValue').textContent = '#--';
    document.querySelector('.level-line strong').textContent = '今日进度';
    $('#xpText').textContent = '-- / 3 亿';
    $('#xpFill').style.width = '4%';
    $('#rankDelta').textContent = '#--';
    $('#rankGap').innerHTML = '排名状态<br>等待 OpenToken 上报';
    $('#serviceText').textContent = account + ' · proxy listening · ' + daemon;
    $('#toolList').innerHTML = '<div class="tool"><span>Waiting</span><span></span><span class="tool-value">--</span></div>';
    renderQuests(data.quests);
    icons();
    return;
  }
  const game = data.game || {};
  const xp = Math.min(game.xp || data.xp || 0, game.xpMax || data.xpMax || 4800);
  const max = game.xpMax || data.xpMax || 4800;
  const total = data.total || 0;
  const rank = data.rank || null;
  const account = data.account && data.account.connected
    ? 'scys ' + data.account.accountId
    : '未绑定 scys';
  const daemon = data.service && data.service.running ? 'daemon running' : 'service unknown';
  const battleText = data.rankEstimated
    ? '预计排名 ' + esc(data.rankLabel || '#--') + '<br>等待官网确认'
    : rank === 1
      ? '今日总榜第 1<br>领先第 2 名 ' + esc(data.leadOverNextLabel || '0')
      : rank
        ? '今日总榜 ' + esc(data.rankLabel || ('#' + rank)) + '<br>距上一名 ' + esc(data.gapToPreviousLabel || '0')
        : '排名状态<br>等待官网确认';

  $('#totalValue').textContent = data.totalLabel || '0';
  $('#rankValue').textContent = data.rankLabel || (rank ? '#' + rank : '#--');
  document.querySelector('.level-line strong').textContent = game.levelTitle || '今日进度';
  $('#xpText').textContent = game.xpLabel || (xp.toLocaleString() + ' / ' + max.toLocaleString());
  $('#xpFill').style.width = Math.max(4, game.xpPct || Math.round((xp / max) * 100)) + '%';
  $('#rankDelta').textContent = data.rankEstimated ? '待确认' : (rank ? (data.rankLabel || '#' + rank) : '#--');
  $('#rankGap').innerHTML = battleText;
  $('#serviceText').textContent = account + ' · ' + data.date + ' · ' + daemon;
  $('#toolList').innerHTML = (data.tools || []).map((tool) =>
    '<div class="tool"><span>' + esc(tool.label) + '</span><span class="bar"><i style="width:' + tool.pct + '%"></i></span><span class="tool-value">' + esc(tool.valueLabel) + '</span></div>'
  ).join('') || '<div class="tool"><span>No data</span><span></span><span class="tool-value">--</span></div>';
  renderQuests(data.quests);
  icons();
}

function posterErrorLabel(error) {
  return error && error.name === 'AbortError' ? 'Canceled' : 'Retry';
}

async function sharePoster() {
  const shareButton = $('#shareButton');
  const shareLabel = $('#shareLabel');
  const summary = latestSummary && latestSummary.ok ? latestSummary : { total: 0, totalLabel: '0' };
  let resetLabel = true;
  void logClientEvent('popover.share.click', {
    hasSummary: Boolean(latestSummary && latestSummary.ok),
    rank: summary.rank || null,
    total: summary.total || 0
  });
  shareButton.disabled = true;
  shareButton.style.opacity = '0.72';
  shareButton.title = '';
  shareLabel.textContent = 'Generating...';
  try {
    if (!window.OpenTokenSharePoster) throw new Error('Share poster module unavailable');
    const posterOptions = {
      rank: summary.rank,
      rankLabel: summary.rankLabel,
      rankDelta: summary.rankDelta,
      rankEstimated: summary.rankEstimated,
      gapToPreviousLabel: summary.gapToPreviousLabel,
      leadOverNextLabel: summary.leadOverNextLabel,
      templateUrl: './assets/share-poster-template.html'
    };
    const result = await window.OpenTokenSharePoster.downloadSharePoster(summary, posterOptions);
    shareLabel.textContent = result.action === 'shared' ? 'Shared' : result.action === 'copied' ? 'Copied' : 'Started';
    shareButton.title = result.action === 'shared'
      ? 'Shared with the system share sheet'
      : result.action === 'copied'
        ? 'Copied one PNG image to the clipboard'
        : 'Download was triggered. Check your browser or WebView downloads.';
    void logClientEvent('popover.share.complete', { action: result.action, fileName: result.fileName });
  } catch (error) {
    console.error(error);
    shareLabel.textContent = posterErrorLabel(error);
    shareButton.title = error && error.message ? error.message : 'Poster generation failed';
    resetLabel = error && error.name === 'AbortError';
    void logClientEvent('popover.share.failed', { name: error && error.name, message: error && error.message });
  } finally {
    const resetButton = () => {
      shareButton.disabled = false;
      shareButton.style.opacity = '1';
      if (resetLabel) {
        shareLabel.textContent = 'Share';
        shareButton.title = '';
      }
    };
    if (resetLabel) setTimeout(resetButton, 1400);
    else resetButton();
  }
}

async function load(refresh = false) {
  void logClientEvent('popover.summary.load', { refresh });
  try {
    const response = await fetch(API + (refresh ? '/summary?refresh=1' : '/summary'), {
      headers: refresh ? tokenHeaders() : {}
    });
    const data = await response.json();
    render(data);
    void logClientEvent('popover.summary.loaded', {
      refresh,
      status: response.status,
      ok: Boolean(data && data.ok),
      waiting: Boolean(data && data.waiting),
      rank: data && data.rank || null
    });
    return data;
  } catch (error) {
    $('#serviceText').textContent = 'Live API unavailable';
    void logClientEvent('popover.summary.failed', { refresh, message: error && error.message });
    return null;
  }
}

function delay(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

async function waitForFreshSummary(previousCapturedAt) {
  void logClientEvent('popover.summary.waitFresh.start', { hasPreviousCapture: Boolean(previousCapturedAt) });
  const deadline = Date.now() + 15000;
  while (Date.now() < deadline) {
    const data = await load();
    if (!previousCapturedAt || (data && data.capturedAt && data.capturedAt !== previousCapturedAt)) {
      void logClientEvent('popover.summary.waitFresh.complete', { capturedAt: data && data.capturedAt || '' });
      return data;
    }
    await delay(500);
  }
  void logClientEvent('popover.summary.waitFresh.timeout', { previousCapturedAt });
  return latestSummary;
}

async function pollIslandEvent() {
  try {
    const response = await fetch(API + '/island-event');
    const data = await response.json();
    const id = Number(data && data.event && data.event.id || 0);
    const now = Date.now();
    const shouldLogPoll = lastIslandEventId === null || id > lastIslandEventId || now - lastIslandEventPollLogAt > 60000;
    if (shouldLogPoll) {
      lastIslandEventPollLogAt = now;
      void logClientEvent('popover.islandEvent.poll', { status: response.status, id });
    }
    if (lastIslandEventId === null) {
      lastIslandEventId = id;
      return;
    }
    if (id > lastIslandEventId) {
      lastIslandEventId = id;
      void logClientEvent('popover.islandEvent.detected', { id });
      await load();
    }
  } catch (error) {
    const now = Date.now();
    if (now - lastIslandEventFailureLogAt > 60000) {
      lastIslandEventFailureLogAt = now;
      void logClientEvent('popover.islandEvent.failed', { message: error && error.message });
    }
  }
}

window.OpenTokenIslandRefresh = () => load();

$('#uploadButton').onclick = async () => {
  setLoad(true);
  void logClientEvent('popover.upload.click', { capturedAt: latestSummary && latestSummary.capturedAt || '' });
  try {
    const previousCapturedAt = latestSummary && latestSummary.capturedAt || '';
    const response = await fetch(API + '/upload', { method: 'POST', headers: tokenHeaders() });
    const result = await response.json().catch(() => null);
    void logClientEvent('popover.upload.complete', {
      status: response.status,
      ok: Boolean(result && result.ok),
      hasSummary: Boolean(result && result.summary)
    });
    if (result && result.summary) render({ ...result.summary, account: result.account, service: result.service });
    if (!response.ok || !result || result.ok === false) {
      $('#serviceText').textContent = 'Upload failed; check logs';
      return;
    }
    await waitForFreshSummary(previousCapturedAt);
  } catch (error) {
    $('#serviceText').textContent = 'Upload API unavailable';
    void logClientEvent('popover.upload.failed', { message: error && error.message });
  } finally {
    setLoad(false);
  }
};

$('#shareButton').onclick = sharePoster;

$('#refreshButton').onclick = async () => {
  setLoad(true);
  void logClientEvent('popover.refresh.click');
  try {
    await load(true);
    void logClientEvent('popover.refresh.complete');
  } catch (error) {
    void logClientEvent('popover.refresh.failed', { message: error && error.message });
  } finally {
    setLoad(false);
  }
};

$('#openLogsButton').onclick = async () => {
  void logClientEvent('popover.openLogs.click');
  try {
    const response = await fetch(API + '/logs/open', { method: 'POST', headers: tokenHeaders() });
    void logClientEvent('popover.openLogs.complete', { status: response.status });
  } catch (error) {
    $('#serviceText').textContent = 'Could not open logs';
    void logClientEvent('popover.openLogs.failed', { message: error && error.message });
  }
};

async function init() {
  try {
    await loadClientConfig();
  } catch (error) {
    $('#serviceText').textContent = 'Local client token unavailable';
    void logClientEvent('popover.clientConfig.failed', { message: error && error.message });
  }
  await load();
}

icons();
init();
setInterval(pollIslandEvent, 2000);
setInterval(load, 30000);
</script></body></html>
