<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <script src="./assets/vendor/lucide-lite.js"></script>
  <style>
    :root{color-scheme:dark;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif;--blue:#0a84ff;--scys-green:#36a590;--scys-gold:#d8bf85;--scys-orange:#ff8617}
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:transparent;color:white;overflow:hidden}
    body{display:grid;place-items:center;padding:8px}
    .island{position:relative;width:calc(100vw - 16px);height:calc(100vh - 16px);border-radius:34px;background:linear-gradient(105deg,#020403 0%,#050807 44%,#010202 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.055),inset 0 14px 32px rgba(255,255,255,.025);overflow:hidden}
    .island::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(54,165,144,.13),transparent 46%),linear-gradient(180deg,rgba(255,255,255,.035),transparent 42%);pointer-events:none}
    .content{position:relative;z-index:1;height:100%;display:grid;grid-template-columns:54px 1fr 104px;align-items:center;gap:14px;padding:18px 22px}
    .icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;background:rgba(255,255,255,.12);color:var(--blue)}
    h1{margin:0 0 5px;font-size:17px;line-height:1.15}
    .copy{margin:0;color:rgba(255,255,255,.64);font-size:13px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .metric{text-align:right;font-variant-numeric:tabular-nums}
    .metric strong{font-size:24px;display:block}
    .metric span{font-size:12px;color:rgba(255,255,255,.52);white-space:nowrap}
    .track{grid-column:2/4;height:7px;border-radius:99px;background:rgba(255,255,255,.10);overflow:hidden;margin-top:-8px}
    .track i{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,var(--scys-green),var(--scys-gold),var(--scys-orange));transition:width .9s cubic-bezier(.16,1,.3,1)}
    @media (prefers-reduced-motion:reduce){.track i{transition:none}}
  </style>
</head>
<body>
  <section class="island">
    <div class="content">
      <div class="icon" id="icon"><i data-lucide="award"></i></div>
      <div>
        <h1 id="title">OpenToken 已同步</h1>
        <p id="copy" class="copy">真实数据已刷新，排名和今日 token 已更新。</p>
      </div>
      <div class="metric"><strong id="metric">#--</strong><span id="meta">live</span></div>
      <div class="track"><i id="trackFill"></i></div>
    </div>
  </section>
  <script>
    if (window.lucide) lucide.createIcons();
    const iconEl = document.getElementById('icon');
    const titleEl = document.getElementById('title');
    const copyEl = document.getElementById('copy');
    const metricEl = document.getElementById('metric');
    const metaEl = document.getElementById('meta');
    const trackFillEl = document.getElementById('trackFill');
    const API = '/api';
    let apiToken = '';

    async function loadClientConfig() {
      const response = await fetch(API + '/client-config');
      const data = await response.json();
      apiToken = data.apiToken || '';
    }

    function tokenHeaders(extra = {}) {
      return apiToken
        ? { ...extra, 'x-opentoken-island-token': apiToken }
        : extra;
    }

    function logClientEvent(event, details = {}) {
      if (!apiToken) return Promise.resolve(false);
      const controller = typeof AbortController === 'function' ? new AbortController() : null;
      const timeout = controller ? setTimeout(() => controller.abort(), 1500) : null;
      return fetch(API + '/logs/event', {
        method: 'POST',
        headers: tokenHeaders({ 'content-type': 'application/json' }),
        body: JSON.stringify({
          layer: 'island',
          event,
          flow: event,
          details
        }),
        keepalive: true,
        signal: controller && controller.signal
      }).then(() => true).catch(() => false).finally(() => {
        if (timeout) clearTimeout(timeout);
      });
    }

    // 灵动岛是纯展示层：文案、图标、右侧指标全部来自服务端算好的 data.report，
    // 这里不再自行推导「守榜/追赶」——那套逻辑已收归 server 端的 buildBattleReport。
    async function loadSummary() {
      void logClientEvent('island.summary.load');
      try {
        const response = await fetch('/api/summary');
        const data = await response.json();
        if (!data.ok) return;
      const game = data.game || {};
      const report = data.report || {};
      // 战报左侧图标随类型变化（lucide）；report 缺失时回退到默认 award 图标。
      iconEl.innerHTML = `<i data-lucide="${report.icon || 'award'}"></i>`;
      if (window.lucide) lucide.createIcons();
      titleEl.textContent = report.title || (data.rankEstimated ? `预计 ${data.rankLabel || '#--'}` : `今日 ${data.totalLabel || '--'} token`);
      copyEl.textContent = report.copy || (data.rankEstimated ? '等待榜单确认' : '');
      metricEl.textContent = report.metric || data.rankLabel || '#--';
      metaEl.textContent = game.mainTool ? game.mainTool.label : 'live';
      trackFillEl.style.width = Math.max(4, game.xpPct || 0) + '%';
        void logClientEvent('island.summary.loaded', {
          status: response.status,
          rank: data.rank || null,
          waiting: Boolean(data.waiting)
        });
      } catch (error) {
        void logClientEvent('island.summary.failed', { message: error && error.message });
      }
    }

    loadClientConfig().catch(() => {}).finally(loadSummary);
  </script>
</body>
</html>
